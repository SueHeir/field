name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build + test + validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout field
        uses: actions/checkout@v4
        with:
          path: field

      - name: Checkout grass sibling
        uses: actions/checkout@v4
        with:
          repository: SueHeir/grass
          path: grass

      - name: Install OpenMPI
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev openmpi-bin

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: field -> target

      # Gate the whole workspace so newly added members/examples are covered
      # automatically (no hand-maintained package list to drift). field_p4est is
      # the sole exclusion: it wraps the p4est C library via a build script that
      # needs a p4est install (P4EST_PREFIX), provisioning tracked separately.
      - name: Build workspace
        working-directory: field
        run: cargo build --workspace --exclude field_p4est --all-targets

      - name: Test workspace
        working-directory: field
        run: cargo test --workspace --exclude field_p4est

      - name: Run validation example
        working-directory: field
        run: python3 examples/fem_poisson/sweep.py
