name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build + test + validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout field
        uses: actions/checkout@v4
        with:
          path: field

      - name: Checkout grass sibling
        uses: actions/checkout@v4
        with:
          repository: SueHeir/grass
          path: grass

      - name: Install OpenMPI and p4est
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev openmpi-bin libp4est-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: field -> target

      - name: Build workspace
        working-directory: field
        env:
          P4EST_PREFIX: /usr
        run: cargo build --workspace --all-targets

      - name: Test workspace
        working-directory: field
        env:
          P4EST_PREFIX: /usr
        run: cargo test --workspace

      - name: Run validation example
        working-directory: field
        run: python3 examples/fem_poisson/sweep.py
